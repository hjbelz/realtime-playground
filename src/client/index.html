<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <title>OpenAI Realtime Voice Demo</title>
  <style>
    /* ── Reset centred column ── */
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1rem 1rem;
      box-sizing: border-box;
    }

    /* ── Heading with custom font ── */
    h1 {
      font-family: "Audiowide", sans-serif;
      font-weight: 400;
      font-size: 3rem;
      font-style: normal;
      margin-block-start: 0;
      margin-block-end: 1.5rem;
      color: hsl(0, 0%, 45%);
    }

    /* ── Two-column page grid ── */
    #app-grid {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) minmax(300px, 1fr);
      gap: 2rem;
      align-items: start;
    }

    /* ── Connection info bar ── */
    #connection-info {
      display: flex; gap: 1.5rem; align-items: center;
      font-size: 0.85rem; color: #666; margin-bottom: 0.75rem;
    }
    #connection-info .info-label { color: #999; }
    #connection-info .info-value { font-weight: 600; color: #333; }
    #provider-badge {
      font-size: 0.8rem; font-weight: 600; padding: 0.15rem 0.55rem;
      border-radius: 4px; color: #fff; display: none;
    }
    #provider-badge.openai { background: #10a37f; display: inline-block; }
    #provider-badge.azure { background: #0078d4; display: inline-block; }
    #status { font-weight: 600; }
    #status.disconnected { color: #999; }
    #status.connecting { color: #d97706; }
    #status.connected { color: #22c55e; }
    #status.error { color: #ef4444; }

    /* ── Control panel (button + emoji + bar per row) ── */
    #control-panel {
      display: flex; flex-direction: column; gap: 0.5rem;
      background: #e5e7eb; border-radius: 8px; padding: 0.6rem;
      margin-bottom: 0.75rem;
    }
    .control-row {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .control-row button { flex-shrink: 0; }
    #events {
      border: 1px solid #ccc; padding: 0.5rem;
      height: 400px; overflow-y: auto;
    }
    #event-filters {
      display: flex; flex-wrap: wrap; gap: 0.25rem 0.5rem;
      font-size: 0.8rem; margin-bottom: 0.35rem;
    }
    #event-filters label {
      display: flex; align-items: center; gap: 0.2rem;
      cursor: pointer; user-select: none;
      padding: 0.15rem 0.5rem; border-radius: 999px;
    }
    #event-filters label[data-group="session"]            { background: #dbeafe; }
    #event-filters label[data-group="input_audio_buffer"] { background: #fce7f3; }
    #event-filters label[data-group="conversation"]       { background: #d1fae5; }
    #event-filters label[data-group="response"]           { background: #fef3c7; }
    #event-filters label[data-group="output_audio_buffer"]{ background: #ede9fe; }
    #event-filters label[data-group="rate_limits"]        { background: #fee2e2; }

    /* ── Event box structure ── */
    .event-box {
      border-radius: 6px; margin-bottom: 4px; overflow: hidden;
      font-family: monospace; font-size: 0.82rem;
    }
    .event-box-header {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.5rem; cursor: pointer; user-select: none;
    }
    .event-toggle {
      font-size: 0.65rem; flex-shrink: 0; width: 1em; text-align: center;
      transition: transform 0.15s; display: inline-block;
    }
    .event-toggle.expanded { transform: rotate(90deg); }
    .event-pill {
      display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px;
      color: #fff; font-size: 0.75rem; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    }
    .event-subtype {
      font-size: 0.75rem; color: #555;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-body {
      display: none;
      padding: 0.4rem 0.5rem 0.5rem 1.8rem;
      font-size: 0.78rem; white-space: pre-wrap; word-break: break-all;
      border-top: 1px solid rgba(0,0,0,0.08);
      max-height: 300px; overflow-y: auto;
    }
    .event-box.expanded .event-body { display: block; }

    /* ── Per-group colors ── */
    .event-group-session              { background: #dbeafe; }
    .event-group-input_audio_buffer   { background: #fce7f3; }
    .event-group-conversation         { background: #d1fae5; }
    .event-group-response             { background: #fef3c7; }
    .event-group-output_audio_buffer  { background: #ede9fe; }
    .event-group-rate_limits          { background: #fee2e2; }
    .event-pill-session              { background: #2563eb; }
    .event-pill-input_audio_buffer   { background: #db2777; }
    .event-pill-conversation         { background: #059669; }
    .event-pill-response             { background: #d97706; }
    .event-pill-output_audio_buffer  { background: #7c3aed; }
    .event-pill-rate_limits          { background: #dc2626; }

    /* ── Event toolbar ── */
    .event-toolbar { display: flex; gap: 0.4rem; align-items: center; }
    .event-toolbar button {
      background: none; border: 1px solid #ccc; border-radius: 4px;
      cursor: pointer; font-size: 0.8rem; padding: 0.1rem 0.35rem;
      color: #666; line-height: 1;
    }
    .event-toolbar button:hover { background: #eee; color: #333; }

    /* ── Scroll panels in col 2 ── */
    .panel { margin-bottom: 1.25rem; }
    .panel-title { margin: 0 0 0.4rem 0; font-size: 1rem; color: #444; }
    #transcription {
      border: 1px solid #aac; padding: 0.5rem;
      min-height: 100px; max-height: 300px;
      overflow-y: auto; font-size: 1rem;
    }
    .transcript-msg {
      display: grid; grid-template-columns: 5.5rem 1fr;
      gap: 0.4rem; align-items: start; margin-bottom: 0.5rem;
      border-radius: 6px; padding: 0.4rem 0.5rem;
    }
    .transcript-msg-user { background: #dbeafe; }
    .transcript-msg-bot  { background: #d1fae5; }
    .transcript-pill {
      display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px;
      color: #fff; font-size: 0.75rem; font-weight: 600;
      white-space: nowrap; text-align: center; justify-self: start;
      margin-top: 0.15rem;
    }
    .transcript-user { background: #2563eb; }
    .transcript-bot  { background: #059669; }
    #classifications {
      border: 1px solid #cca; padding: 0.5rem;
      min-height: 60px; max-height: 150px;
      overflow-y: auto; font-size: 1rem; font-family: monospace;
    }

    /* ── Token usage (keep existing, just tighten top margin) ── */
    #token-usage { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.75rem; }
    .token-col { background: #f0f0f0; padding: 0.75rem; border-radius: 4px; }
    .token-col .total { font-size: 1.5rem; font-weight: bold; }
    .token-col .label { font-size: 0.8rem; color: #666; margin-bottom: 0.25rem; }
    .token-col .details { font-size: 0.85rem; color: #555; margin-top: 0.4rem; }

    /* ── Panel header with copy button ── */
    .panel-header {
      padding-top: 0.5rem;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.4rem;
    }
    .panel-header .panel-title { margin: 0; }
    .copy-btn {
      background: none; border: 1px solid #ccc; border-radius: 4px;
      cursor: pointer; font-size: 0.9rem; padding: 0.15rem 0.4rem;
      color: #666; line-height: 1;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { background: #eee; color: #333; }
    .copy-btn.copied { border-color: #22c55e; color: #22c55e; }

    /* ── Cost under token count ── */
    .token-col .cost { font-size: 0.8rem; color: #888; margin-top: 0.25rem; }

    /* ── Amplitude bar icons ── */
    .conv-icon { font-size: 1.1rem; flex-shrink: 0; opacity: 0.4; transition: opacity 0.15s; }
    .conv-icon.active { opacity: 1; }
    .amp-track { flex: 1; height: 14px; background: #fff; border-radius: 7px; overflow: hidden; }
    .amp-bar { height: 100%; width: 0%; background: #d1d5db; border-radius: 5px; transition: width 0.04s linear; }
    .amp-bar.active { background: #22c55e; }

    /* ── System prompt pane ── */
    #system-prompt-panel { margin-top: 1rem; }
    #system-prompt {
      width: 100%; box-sizing: border-box;
      height: 120px; resize: vertical;
      border: 1px solid #ccc; border-radius: 4px;
      padding: 0.5rem; font-size: 0.85rem; font-family: monospace;
      background: #fff; color: #222;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    #system-prompt:disabled {
      background: #f5f5f5; color: #999; border-color: #ddd; cursor: not-allowed;
    }

    /* ── Audio-player buttons ── */
    button#start, button#stop {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 1.1rem;
      border: none; border-radius: 999px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }
    button#start:not(:disabled):hover,
    button#stop:not(:disabled):hover  { filter: brightness(1.1); }
    button#start:not(:disabled):active,
    button#stop:not(:disabled):active  { transform: scale(0.96); }
    button:disabled { opacity: 0.45; cursor: default; }

    button#start { background: #22c55e; color: #fff; }
    button#stop  { background: #ef4444; color: #fff; }

    .btn-icon {
      font-size: 0.85rem;
      line-height: 1;
      position: relative; top: 0.5px;
    }
  </style>
</head>
<body>
  <div id="app-grid">
    <!-- Column 1 -->
    <div class="col">
      <h1>OpenAI Realtime Demo</h1>
      <div id="connection-info">
        <span><span class="info-label">Endpoint: </span><span id="provider-badge"></span></span>
        <span><span class="info-label">Connection: </span><span id="status" class="info-value disconnected">Disconnected</span></span>
      </div>
      <div id="control-panel">
        <div class="control-row">
          <button id="start"><span class="btn-icon">▶</span> Start</button>
          <span id="conv-mic-icon" class="conv-icon">🎤</span>
          <div class="amp-track"><div id="conv-mic-bar" class="amp-bar"></div></div>
        </div>
        <div class="control-row">
          <button id="stop" disabled><span class="btn-icon">■</span> Stop</button>
          <span id="conv-model-icon" class="conv-icon">🔊</span>
          <div class="amp-track"><div id="conv-model-bar" class="amp-bar"></div></div>
        </div>
      </div>
      <div id="token-usage">
        <div class="token-col" id="input-col">
          <div class="label">Input tokens</div>
          <div class="total" id="input-total">0</div>
          <div class="details">
            <span id="input-text-tokens">0</span> text &nbsp;
            <span id="input-audio-tokens">0</span> audio
          </div>
          <div class="cost" id="input-cost">$0.000000</div>
        </div>
        <div class="token-col" id="output-col">
          <div class="label">Output tokens</div>
          <div class="total" id="output-total">0</div>
          <div class="details">
            <span id="output-text-tokens">0</span> text &nbsp;
            <span id="output-audio-tokens">0</span> audio
          </div>
          <div class="cost" id="output-cost">$0.000000</div>
        </div>
      </div>
      <div class="panel-header">
        <h3 class="panel-title">Event Log</h3>
        <div class="event-toolbar">
          <button id="expand-all" title="Expand all">⊞</button>
          <button id="collapse-all" title="Collapse all">⊟</button>
          <button class="copy-btn" data-target="events" title="Copy to clipboard">⧉</button>
        </div>
      </div>
      <div id="event-filters">
        <label data-group="session"><input type="checkbox" checked data-group="session">session</label>
        <label data-group="input_audio_buffer"><input type="checkbox" checked data-group="input_audio_buffer">input_audio_buffer</label>
        <label data-group="conversation"><input type="checkbox" checked data-group="conversation">conversation</label>
        <label data-group="response"><input type="checkbox" checked data-group="response">response</label>
        <label data-group="output_audio_buffer"><input type="checkbox" checked data-group="output_audio_buffer">output_audio_buffer</label>
        <label data-group="rate_limits"><input type="checkbox" checked data-group="rate_limits">rate_limits</label>
      </div>
      <div id="events"></div>
      <div id="system-prompt-panel" class="panel">
        <div class="panel-header">
          <h3 class="panel-title">System Prompt</h3>
        </div>
        <textarea id="system-prompt" placeholder="Enter system prompt (only editable while disconnected)…"></textarea>
      </div>
    </div>

    <!-- Column 2 -->
    <div class="col">
      <section class="panel">
        <div class="panel-header">
          <h3 class="panel-title">Transcription</h3>
          <button class="copy-btn" data-target="transcription" title="Copy to clipboard">⧉</button>
        </div>
        <div id="transcription"></div>
      </section>
      <section class="panel">
        <div class="panel-header">
          <h3 class="panel-title">Classifications</h3>
          <button class="copy-btn" data-target="classifications" title="Copy to clipboard">⧉</button>
        </div>
        <div id="classifications"></div>
      </section>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
